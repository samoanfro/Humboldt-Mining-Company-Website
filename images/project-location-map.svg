<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,165,90,0.06)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e0f10"/>
      <stop offset="100%" stop-color="#161819"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- Title block -->
  <g transform="translate(40, 35)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#c9a55a" stroke-width="1"/>
    <text x="36" y="4" fill="#c9a55a" font-family="ui-monospace, monospace" font-size="11" letter-spacing="3" font-weight="500">PROJECT LOCATION</text>
    <text x="0" y="32" fill="#e9e6df" font-family="Georgia, serif" font-size="22" font-weight="500">State of Nevada</text>
    <text x="0" y="54" fill="#8a857a" font-family="ui-sans-serif, sans-serif" font-size="12">Elko County · Charleston Mining District</text>
  </g>

  <!-- Nevada state outline (approximate, stylized) -->
  <!-- Roughly rhomboidal shape: NV runs from northwest to southeast -->
  <g transform="translate(180, 110)">
    <!-- State fill -->
    <path d="M 0,30 L 380,30 L 380,290 L 280,400 L 0,400 Z" 
          fill="#1d2023" stroke="#4b4f55" stroke-width="1.5"/>
    
    <!-- Elko County (NE corner of Nevada) - highlighted -->
    <path d="M 200,30 L 380,30 L 380,140 L 200,140 Z" 
          fill="rgba(201,165,90,0.12)" 
          stroke="#c9a55a" 
          stroke-width="1.5"/>
    
    <!-- Elko county label -->
    <text x="290" y="90" 
          fill="#c9a55a" 
          font-family="ui-sans-serif, sans-serif" 
          font-size="13" 
          font-weight="500"
          text-anchor="middle">ELKO COUNTY</text>
    
    <!-- State label -->
    <text x="190" y="270" 
          fill="#4b4f55" 
          font-family="Georgia, serif" 
          font-size="42" 
          font-weight="400"
          text-anchor="middle"
          letter-spacing="6"
          opacity="0.5">NEVADA</text>
    
    <!-- Prunty Mine marker — top portion of Elko County (north Elko, near Jarbidge) -->
    <g transform="translate(330, 55)">
      <!-- Glow -->
      <circle cx="0" cy="0" r="14" fill="#c9a55a" opacity="0.18" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="10" fill="#c9a55a" opacity="0.3"/>
      <!-- Marker pin -->
      <circle cx="0" cy="0" r="5" fill="#c9a55a"/>
      <circle cx="0" cy="0" r="2" fill="#0e0f10"/>
      <!-- Crosshair lines -->
      <line x1="-22" y1="0" x2="-12" y2="0" stroke="#c9a55a" stroke-width="0.8"/>
      <line x1="12" y1="0" x2="22" y2="0" stroke="#c9a55a" stroke-width="0.8"/>
      <line x1="0" y1="-22" x2="0" y2="-12" stroke="#c9a55a" stroke-width="0.8"/>
      <line x1="0" y1="12" x2="0" y2="22" stroke="#c9a55a" stroke-width="0.8"/>
    </g>
    
    <!-- Pull-line to label -->
    <line x1="335" y1="165" x2="335" y2="195" stroke="#c9a55a" stroke-width="0.8"/>
    
    <!-- Prunty Mine label box -->
    <g transform="translate(195, 200)">
      <rect x="0" y="0" width="280" height="48" fill="#0e0f10" stroke="#c9a55a" stroke-width="1"/>
      <text x="14" y="20" fill="#c9a55a" font-family="ui-monospace, monospace" font-size="9" letter-spacing="2" font-weight="500">PRUNTY MINE</text>
      <text x="14" y="38" fill="#e9e6df" font-family="ui-sans-serif, sans-serif" font-size="11">Charleston District · Patented claims</text>
    </g>
    
    <!-- Compass rose (top right of state) -->
    <g transform="translate(355, 380)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#4b4f55" stroke-width="0.8"/>
      <line x1="0" y1="-16" x2="0" y2="-8" stroke="#c9a55a" stroke-width="1.5"/>
      <text x="0" y="-22" fill="#c9a55a" font-family="ui-sans-serif, sans-serif" font-size="10" text-anchor="middle" font-weight="600">N</text>
    </g>
  </g>

  <!-- Neighboring state hints (subtle text labels) -->
  <g font-family="ui-sans-serif, sans-serif" font-size="10" fill="#4b4f55" letter-spacing="2">
    <text x="190" y="105" text-anchor="end" opacity="0.5">OREGON</text>
    <text x="190" y="295" text-anchor="end" opacity="0.5">CALIFORNIA</text>
    <text x="585" y="105" opacity="0.5">IDAHO</text>
    <text x="585" y="180" opacity="0.5">UTAH</text>
    <text x="585" y="320" opacity="0.5">ARIZONA</text>
  </g>

  <!-- Scale bar -->
  <g transform="translate(40, 560)">
    <line x1="0" y1="0" x2="80" y2="0" stroke="#4b4f55" stroke-width="1"/>
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#4b4f55" stroke-width="1"/>
    <line x1="80" y1="-3" x2="80" y2="3" stroke="#4b4f55" stroke-width="1"/>
    <text x="0" y="-8" fill="#8a857a" font-family="ui-monospace, monospace" font-size="9" letter-spacing="1">~ 200 MI</text>
  </g>

  <!-- Reference note -->
  <text x="760" y="568" 
        text-anchor="end" 
        fill="#4b4f55" 
        font-family="ui-monospace, monospace" 
        font-size="9" 
        letter-spacing="1">SCHEMATIC · NOT FOR NAVIGATION</text>
</svg>
